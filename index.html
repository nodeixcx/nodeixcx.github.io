<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>智库</title>
<style>
:root {
  --bg-color: #fff;
  --text-color: #333;
  --card-color: #f9f9f9;
  --border-color: #eee;
  --primary-color: #425aef;
  --gray-color: #666;
  --red-color: #ff4d4f;
  --active-color: #425aef;
}
.dark-mode {
  --bg-color: #1a1a1a;
  --text-color: #e5e5e5;
  --card-color: #2a2a2a;
  --border-color: #333;
  --primary-color: #5b77ff;
  --gray-color: #999;
  --active-color: #5b77ff;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}
body {
  background: var(--bg-color);
  color: var(--text-color);
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--primary-color);
}
.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  background: var(--primary-color);
  color: #fff;
  cursor: pointer;
}
.admin-login, .admin-panel, .carousel-set {
  background: var(--card-color);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 15px;
}
.admin-login input, .carousel-set textarea {
  padding: 8px;
  margin-right: 8px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  margin-bottom: 10px;
}
.admin-panel, .carousel-set {
  display: none;
}
.show {
  display: block;
}
.upload-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.upload-area input, .upload-area select, .upload-area textarea {
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
}
.carousel {
  position: relative;
  width: 100%;
  height: 260px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}
.carousel-item {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.5s;
}
.carousel-item.active {
  opacity: 1;
}
.carousel-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.4);
  color: #fff;
  font-size: 18px;
  z-index: 10;
  cursor: pointer;
}
.prev-btn { left: 10px; }
.next-btn { right: 10px; }
.category-nav {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.category-item {
  padding: 6px 12px;
  border-radius: 16px;
  background: var(--card-color);
  cursor: pointer;
  border: 1px solid var(--border-color);
}
.category-item.active {
  background: var(--primary-color);
  color: #fff;
  border-color: var(--primary-color);
}
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 15px;
}
.work-card {
  background: var(--card-color);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  padding: 12px;
  cursor: pointer;
}
.work-card-img {
  width: 100%;
  height: 160px;
  border-radius: 8px;
  object-fit: cover;
  margin-bottom: 10px;
  background: #eee;
}
.work-card-title {
  font-size: 16px;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.work-card-meta {
  font-size: 13px;
  color: var(--gray-color);
  display: flex;
  justify-content: space-between;
}
.detail-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  display: none;
  padding: 20px;
  overflow-y: auto;
}
.detail-box {
  max-width: 800px;
  margin: 0 auto;
  background: var(--bg-color);
  border-radius: 12px;
  overflow: hidden;
}
.detail-header {
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-color);
}
.detail-close {
  font-size: 22px;
  cursor: pointer;
}
.detail-media {
  width: 100%;
  max-height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}
.detail-media img, .detail-media video {
  max-width: 100%;
  max-height: 400px;
}
.detail-info {
  padding: 15px;
}
.detail-meta {
  color: var(--gray-color);
  margin: 10px 0;
}
.detail-interact {
  display: flex;
  gap: 20px;
  margin: 15px 0;
}
.like-btn {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: var(--gray-color);
}
.like-btn.active {
  color: var(--red-color);
}
.comment-area {
  border-top: 1px solid var(--border-color);
  padding: 15px;
}
.comment-list {
  margin-bottom: 15px;
  max-height: 200px;
  overflow-y: auto;
}
.comment-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--border-color);
}
.comment-input-box {
  display: flex;
  gap: 8px;
}
.comment-input {
  flex: 1;
  padding: 8px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
}
.hidden { display: none !important; }
@media (max-width:768px){
  .carousel{height:180px;}
  .works-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">智库</div>
  <div>
    <button class="btn" id="themeBtn">暗黑模式</button>
    <button class="btn" id="openCarouselSet">轮播管理</button>
  </div>
</div>

<div class="carousel-set" id="carouselSet">
  <h4>每行填一张轮播链接</h4>
  <textarea id="carouselText" rows="6" style="width:100%;"></textarea>
  <button class="btn" id="saveCarousel">保存轮播</button>
  <button class="btn" id="closeCarouselSet">关闭</button>
</div>

<div class="admin-login" id="adminLogin">
  <input type="text" id="adminAcc" placeholder="管理员账号">
  <input type="password" id="adminPwd" placeholder="密码">
  <button class="btn" id="loginBtn">登录管理</button>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="upload-area">
    <input type="text" id="workTitle" placeholder="作品标题">
    <select id="workType">
      <option value="image">图片</option>
      <option value="video">视频</option>
      <option value="text">文字</option>
    </select>
    <input type="text" id="workAuthor" placeholder="作者昵称">
    <input type="text" id="workUrl" placeholder="图片/视频链接">
    <textarea id="workContent" rows="3" placeholder="作品介绍"></textarea>
    <input type="text" id="workTags" placeholder="标签，逗号分隔">
    <button class="btn" id="pubBtn">发布作品</button>
  </div>
  <br>
  <button class="btn" id="logoutBtn">退出登录</button>
</div>

<div class="carousel" id="carousel">
  <button class="carousel-btn prev-btn" id="prevBtn">&lt;</button>
  <button class="carousel-btn next-btn" id="nextBtn">&gt;</button>
</div>

<div class="category-nav" id="categoryNav">
  <div class="category-item active" data-type="all">全部</div>
  <div class="category-item" data-type="image">图片</div>
  <div class="category-item" data-type="video">视频</div>
  <div class="category-item" data-type="text">文字</div>
</div>

<div class="works-grid" id="worksGrid"></div>

<div class="detail-modal" id="detailModal">
  <div class="detail-box">
    <div class="detail-header">
      <h3 id="detailTitle"></h3>
      <span class="detail-close" id="detailClose">×</span>
    </div>
    <div class="detail-media" id="detailMedia"></div>
    <div class="detail-info">
      <div class="detail-meta" id="detailMeta"></div>
      <div id="detailContent"></div>
      <div class="detail-interact">
        <button class="like-btn" id="likeBtn">❤ <span id="likeNum">0</span></button>
        <span>浏览：<span id="viewNum">0</span></span>
      </div>
    </div>
    <div class="comment-area">
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-box">
        <input class="comment-input" id="nickInput" placeholder="昵称" value="访客">
        <input class="comment-input" id="msgInput" placeholder="写评论...">
        <button class="btn" id="sendComment">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
// 云端数据库地址
const API_URL = "https://jsonblob.com/api/jsonBlob/1192001252562219008";
let appData = { carousel:[], works:[], comments:{}, likeRecord:{} };
let curCarouselIdx = 0;
let curWorkId = null;
let isAdmin = false;
const uid = btoa(navigator.userAgent);

// 元素
const themeBtn = document.getElementById("themeBtn");
const openCarouselSet = document.getElementById("openCarouselSet");
const carouselSet = document.getElementById("carouselSet");
const closeCarouselSet = document.getElementById("closeCarouselSet");
const saveCarousel = document.getElementById("saveCarousel");
const carouselText = document.getElementById("carouselText");
const adminLogin = document.getElementById("adminLogin");
const adminPanel = document.getElementById("adminPanel");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const pubBtn = document.getElementById("pubBtn");
const carousel = document.getElementById("carousel");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const categoryNav = document.getElementById("categoryNav");
const worksGrid = document.getElementById("worksGrid");
const detailModal = document.getElementById("detailModal");
const detailClose = document.getElementById("detailClose");

// 禁止页面缓存，强制每次拿新数据
window.onload = () => fetchData();

// 拉取云端最新数据
async function fetchData(){
  try{
    const res = await fetch(API_URL, {cache:"no-cache"});
    const data = await res.json();
    if(data) appData = data;
    renderAll();
  }catch(e){
    console.log("加载云端数据失败");
  }
}

// 保存到云端
async function saveData(){
  await fetch(API_URL,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(appData)
  });
}

// 渲染全部
function renderAll(){
  renderCarousel();
  renderWorks();
}

// 轮播渲染
function renderCarousel(){
  carousel.innerHTML = "";
  if(!appData.carousel.length) return;
  appData.carousel.forEach((item,i)=>{
    const div = document.createElement("div");
    div.className = `carousel-item ${i===curCarouselIdx?"active":""}`;
    div.innerHTML = `<img src="${item.url}" alt="">`;
    carousel.appendChild(div);
  });
  carousel.appendChild(prevBtn);
  carousel.appendChild(nextBtn);
}

prevBtn.onclick = ()=>{
  curCarouselIdx = (curCarouselIdx -1 + appData.carousel.length) % appData.carousel.length;
  renderCarousel();
};
nextBtn.onclick = ()=>{
  curCarouselIdx = (curCarouselIdx +1) % appData.carousel.length;
  renderCarousel();
};

// 轮播管理
openCarouselSet.onclick = ()=>{
  if(!isAdmin) return alert("请先登录管理员");
  carouselSet.classList.add("show");
  carouselText.value = appData.carousel.map(x=>x.url).join("\n");
};
closeCarouselSet.onclick = ()=>carouselSet.classList.remove("show");

saveCarousel.onclick = async ()=>{
  const lines = carouselText.value.trim().split("\n").filter(line=>line.startsWith("http"));
  appData.carousel = lines.map(url=>({url}));
  await saveData();
  alert("保存成功，所有人同步更新");
  carouselSet.classList.remove("show");
  fetchData();
};

// 暗黑模式
themeBtn.onclick = ()=>document.body.classList.toggle("dark-mode");

// 管理员登录
loginBtn.onclick = ()=>{
  const acc = document.getElementById("adminAcc").value.trim();
  const pwd = document.getElementById("adminPwd").value.trim();
  if(acc==="MINETOWN" && pwd==="Uis12123password"){
    isAdmin = true;
    adminLogin.classList.add("hidden");
    adminPanel.classList.add("show");
  }else alert("账号密码错误");
};
logoutBtn.onclick = ()=>{
  isAdmin = false;
  adminLogin.classList.remove("hidden");
  adminPanel.classList.remove("show");
};

// 发布作品
pubBtn.onclick = async ()=>{
  if(!isAdmin) return;
  const title = document.getElementById("workTitle").value.trim();
  const type = document.getElementById("workType").value;
  const author = document.getElementById("workAuthor").value.trim()||"匿名";
  const url = document.getElementById("workUrl").value.trim();
  const content = document.getElementById("workContent").value.trim();
  const tags = document.getElementById("workTags").value.split(",").map(t=>t.trim()).filter(t=>t);
  if(!title) return alert("请填标题");
  const id = Date.now();
  appData.works.unshift({
    id,title,type,author,url,content,tags,
    time:new Date().toLocaleDateString(),
    views:0,likes:0
  });
  await saveData();
  alert("发布成功，所有人可见");
  fetchData();
};

// 分类切换
categoryNav.querySelectorAll(".category-item").forEach(item=>{
  item.onclick = function(){
    categoryNav.querySelectorAll(".category-item").forEach(i=>i.classList.remove("active"));
    this.classList.add("active");
    const type = this.dataset.type;
    renderWorks(type);
  };
});

// 渲染作品
function renderWorks(filterType="all"){
  let list = [...appData.works];
  if(filterType!=="all") list = list.filter(x=>x.type===filterType);
  worksGrid.innerHTML = "";
  list.forEach(work=>{
    const card = document.createElement("div");
    card.className = "work-card";
    let imgSrc = work.url || "https://nodeixcx.github.io/9.png";
    if(work.type==="text") imgSrc = "https://nodeixcx.github.io/9.png";
    card.innerHTML = `
      <img class="work-card-img" src="${imgSrc}">
      <h4 class="work-card-title">${work.title}</h4>
      <div class="work-card-meta">
        <span>${work.time}</span>
        <span>❤${work.likes}</span>
      </div>
    `;
    card.onclick = ()=>openDetail(work.id);
    worksGrid.appendChild(card);
  });
}

// 作品详情
function openDetail(id){
  const work = appData.works.find(x=>x.id===id);
  if(!work) return;
  curWorkId = id;
  work.views++;
  saveData();
  document.getElementById("detailTitle").innerText = work.title;
  document.getElementById("detailMeta").innerText = `作者：${work.author} | 标签：${work.tags.join(",")||"无"}`;
  document.getElementById("detailContent").innerText = work.content;
  document.getElementById("likeNum").innerText = work.likes;
  document.getElementById("viewNum").innerText = work.views;

  let mediaHtml = "";
  if(work.type==="image") mediaHtml = `<img src="${work.url}">`;
  if(work.type==="video") mediaHtml = `<video controls src="${work.url}"></video>`;
  document.getElementById("detailMedia").innerHTML = mediaHtml;

  detailModal.style.display = "block";
  renderComment();
}
detailClose.onclick = ()=>detailModal.style.display = "none";

// 点赞
document.getElementById("likeBtn").onclick = async function(){
  const key = uid + "_" + curWorkId;
  if(appData.likeRecord[key]){
    const work = appData.works.find(x=>x.id===curWorkId);
    work.likes--;
    delete appData.likeRecord[key];
    this.classList.remove("active");
  }else{
    const work = appData.works.find(x=>x.id===curWorkId);
    work.likes++;
    appData.likeRecord[key] = 1;
    this.classList.add("active");
  }
  document.getElementById("likeNum").innerText = appData.works.find(x=>x.id===curWorkId).likes;
  await saveData();
};

// 评论渲染
function renderComment(){
  const list = appData.comments[curWorkId]||[];
  const box = document.getElementById("commentList");
  box.innerHTML = "";
  list.forEach(c=>{
    box.innerHTML += `
      <div class="comment-item">
        <div><b>${c.nick}</b>：${c.msg}</div>
        <div style="font-size:12px;color:#999;">${c.time}</div>
      </div>
    `;
  });
}

// 发评论
document.getElementById("sendComment").onclick = async ()=>{
  const nick = document.getElementById("nickInput").value.trim()||"访客";
  const msg = document.getElementById("msgInput").value.trim();
  if(!msg) return;
  if(!appData.comments[curWorkId]) appData.comments[curWorkId] = [];
  appData.comments[curWorkId].push({
    nick,msg,time:new Date().toLocaleString()
  });
  document.getElementById("msgInput").value = "";
  await saveData();
  renderComment();
};
</script>
</body>
</html>
