<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智库</title>
<style>
:root {
  --bg-color: #fff;
  --text-color: #333;
  --card-color: #f9f9f9;
  --border-color: #eee;
  --primary-color: #425aef;
  --gray-color: #666;
  --red-color: #ff4d4f;
  --active-color: #425aef;
}
.dark-mode {
  --bg-color: #1a1a1a;
  --text-color: #e5e5e5;
  --card-color: #2a2a2a;
  --border-color: #333;
  --primary-color: #5b77ff;
  --gray-color: #999;
  --active-color: #5b77ff;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  background: var(--bg-color);
  color: var(--text-color);
  transition: all 0.3s;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  line-height: 1.6;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--primary-color);
}
.theme-btn, .admin-btn {
  padding: 8px 16px;
  border: none;
  border-radius: 20px;
  background: var(--primary-color);
  color: #fff;
  cursor: pointer;
}
.admin-login, .admin-panel {
  background: var(--card-color);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 20px;
}
.admin-login {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.admin-login input {
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
}
.admin-panel {
  display: none;
}
.admin-panel.show {
  display: block;
}
.upload-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.upload-area input,
.upload-area select,
.upload-area textarea {
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
}
.upload-btn {
  background: var(--primary-color);
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
.carousel {
  position: relative;
  width: 100%;
  height: 300px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 30px;
  border: 1px solid var(--border-color);
}
.carousel-item {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s;
}
.carousel-item.active {
  opacity: 1;
}
.carousel-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  z-index: 10;
}
.prev-btn { left: 10px; }
.next-btn { right: 10px; }
.category-nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 10px;
}
.category-item {
  padding: 8px 16px;
  cursor: pointer;
  position: relative;
  color: var(--text-color);
  transition: color 0.3s;
}
.category-item.active {
  color: var(--active-color);
}
.category-item.active::after {
  content: "";
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid var(--active-color);
}
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}
.work-card {
  background: var(--card-color);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: transform 0.2s;
}
.work-card:hover {
  transform: translateY(-5px);
}
.work-card-img {
  width: 100%;
  height: 180px;
  border-radius: 8px;
  object-fit: cover;
  margin-bottom: 10px;
}
.work-card-title {
  font-size: 18px;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.work-card-meta {
  font-size: 12px;
  color: var(--gray-color);
  display: flex;
  justify-content: space-between;
}
.detail-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  display: none;
  padding: 20px;
  overflow-y: auto;
}
.detail-modal.show {
  display: block;
}
.detail-box {
  max-width: 900px;
  margin: 0 auto;
  background: var(--bg-color);
  border-radius: 12px;
  overflow: hidden;
}
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid var(--border-color);
}
.detail-close {
  font-size: 24px;
  cursor: pointer;
}
.detail-more {
  font-size: 20px;
  cursor: pointer;
}
.detail-media {
  width: 100%;
  max-height: 500px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-media img, .detail-media video, .detail-media audio {
  max-width: 100%;
  max-height: 500px;
}
.detail-info {
  padding: 20px;
}
.detail-title {
  font-size: 24px;
  margin-bottom: 10px;
}
.detail-meta {
  display: flex;
  gap: 20px;
  color: var(--gray-color);
  margin-bottom: 15px;
}
.detail-interact {
  display: flex;
  gap: 20px;
  margin: 15px 0;
}
.like-btn {
  background: none;
  border: none;
  color: var(--gray-color);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}
.like-btn.active {
  color: var(--red-color);
}
.comment-area {
  border-top: 1px solid var(--border-color);
  padding: 20px;
}
.comment-list {
  margin-bottom: 20px;
}
.comment-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
}
.comment-self {
  text-align: right;
}
.comment-author {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
}
.comment-time {
  font-size: 12px;
  color: var(--gray-color);
  margin-bottom: 5px;
}
.comment-input-box {
  display: flex;
  gap: 10px;
}
.comment-input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
}
.comment-send {
  padding: 0 20px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.func-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-color);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 20px;
  z-index: 1000;
  display: none;
}
.func-modal.show {
  display: block;
}
.func-modal input, .func-modal textarea {
  width: 300px;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--bg-color);
  color: var(--text-color);
}
.func-btn-group {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.func-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.confirm-btn {
  background: var(--primary-color);
  color: #fff;
}
.cancel-btn {
  background: var(--gray-color);
  color: #fff;
}
.hidden {
  display: none !important;
}
@media (max-width: 768px) {
  body { padding: 16px; }
  .carousel { height: 170px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">智库</div>
  <button class="theme-btn" id="themeBtn">切换黑暗模式</button>
</div>

<div class="admin-login" id="adminLogin">
  <input type="text" id="adminAccount" placeholder="管理员账号">
  <input type="password" id="adminPwd" placeholder="管理员密码">
  <button class="admin-btn" id="loginBtn">登录管理</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>管理员上传作品</h3>
  <div class="upload-area">
    <input type="text" id="workTitle" placeholder="作品标题" required>
    <select id="workType">
      <option value="text">文字</option>
      <option value="image">图片</option>
      <option value="video">视频</option>
      <option value="audio">音频</option>
    </select>
    <input type="text" id="workAuthor" placeholder="作者（可匿名）" value="匿名">
    <input type="text" id="workUrl" placeholder="文件外链（图片/视频/音频）">
    <textarea id="workContent" rows="3" placeholder="作品文字内容"></textarea>
    <input type="text" id="workTags" placeholder="标签（逗号分隔）">
    <button class="upload-btn" id="uploadBtn">上传作品</button>
  </div>
  <br>
  <button class="admin-btn" id="logoutBtn">退出管理</button>
</div>

<div class="carousel" id="carousel">
  <button class="carousel-btn prev-btn" id="prevCarousel">&lt;&lt;</button>
  <button class="carousel-btn next-btn" id="nextCarousel">&gt;&gt;</button>
</div>

<div class="category-nav" id="categoryNav">
  <div class="category-item active" data-type="all">主页</div>
  <div class="category-item" data-type="text">文章</div>
  <div class="category-item" data-type="image">图片</div>
  <div class="category-item" data-type="video">视频</div>
  <div class="category-item" data-type="audio">音频</div>
</div>

<div class="works-grid" id="worksGrid"></div>

<div class="detail-modal" id="detailModal">
  <div class="detail-box">
    <div class="detail-header">
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-more" id="detailMore">⋮</div>
      <div class="detail-close" id="detailClose">×</div>
    </div>
    <div class="detail-media" id="detailMedia"></div>
    <div class="detail-info">
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="detail-interact">
        <button class="like-btn" id="detailLikeBtn"> ❤ <span id="detailLikeCount">0</span> </button>
        <span id="detailViewCount">浏览：0</span>
      </div>
    </div>
    <div class="comment-area">
      <h3>评论区</h3>
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-box">
        <input type="text" class="comment-input" id="commentInput" placeholder="发表评论">
        <button class="comment-send" id="commentSend">发送</button>
      </div>
    </div>
  </div>
</div>

<div class="func-modal" id="editModal">
  <h3>编辑作品</h3>
  <input type="hidden" id="editWorkId">
  <input type="text" id="editTitle" placeholder="作品标题">
  <textarea rows="3" id="editContent" placeholder="作品内容"></textarea>
  <input type="text" id="editUrl" placeholder="文件外链">
  <div class="func-btn-group">
    <button class="func-btn cancel-btn" id="cancelEdit">取消</button>
    <button class="func-btn confirm-btn" id="confirmEdit">确定</button>
  </div>
</div>

<div class="func-modal" id="shareModal">
  <h3>分享链接</h3>
  <input type="text" id="shareUrl" readonly>
  <div class="func-btn-group">
    <button class="func-btn confirm-btn" id="copyShareUrl">复制链接</button>
    <button class="func-btn cancel-btn" id="cancelShare">关闭</button>
  </div>
</div>

<script>
// ==================== 公共后端API配置 ====================
const API_BASE = "https://jsonblob.com/api/jsonBlob/1191994515886084096";
// =======================================================

// 存储模块（对接公共后端）
const Storage = {
  works: [],
  comments: {},
  likes: {},
  async init() {
    try {
      const res = await fetch(API_BASE);
      const data = await res.json();
      this.works = data.works || [];
      this.comments = data.comments || {};
      this.likes = data.likes || {};
    } catch (e) {
      this.works = [];
      this.comments = {};
      this.likes = {};
    }
    // 初始化默认数据
    if (this.works.length === 0) {
      this.works = [{
        id: 1,
        title: "智库 欢迎你",
        type: "text",
        author: "管理员",
        url: "",
        content: "这里是智库作品墙，管理员上传的作品所有人都能看到！",
        tags: ["公告"],
        views: 0,
        likes: 0,
        time: new Date().toLocaleDateString()
      }];
      await this.saveAll();
    }
  },
  async saveAll() {
    await fetch(API_BASE, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        works: this.works,
        comments: this.comments,
        likes: this.likes
      })
    });
  },
  getWorks() { return this.works; },
  async addWork(w) {
    w.id = this.works.length ? Math.max(...this.works.map(x=>x.id)) + 1 : 1;
    w.views = 0; w.likes = 0; w.time = new Date().toLocaleDateString();
    this.works.unshift(w);
    await this.saveAll();
  },
  async addViews(id) {
    const i = this.works.findIndex(x=>x.id===id);
    if (i!==-1) { this.works[i].views++; await this.saveAll(); }
  },
  async toggleLike(id, userId) {
    const key = `${id}_${userId}`;
    const liked = !this.likes[key];
    this.likes[key] = liked;
    const i = this.works.findIndex(x=>x.id===id);
    if (i!==-1) { liked ? this.works[i].likes++ : this.works[i].likes--; }
    await this.saveAll();
    return liked;
  },
  async editWork(w) {
    const i = this.works.findIndex(x=>x.id===w.id);
    if (i===-1) return false;
    this.works[i] = {...this.works[i], ...w};
    await this.saveAll();
    return true;
  },
  async deleteWork(id) {
    this.works = this.works.filter(x=>x.id!==id);
    delete this.comments[id];
    await this.saveAll();
  },
  shareWork(id) {
    const w = this.works.find(x=>x.id===id);
    if (!w) return '';
    return `${window.location.origin}${window.location.pathname}?id=${id}`;
  },
  getComments(id) { return this.comments[id] || []; },
  async addComment(id, co) {
    if (!this.comments[id]) this.comments[id] = [];
    co.id = this.comments[id].length ? Math.max(...this.comments[id].map(x=>x.id)) + 1 : 1;
    co.time = new Date().toLocaleString();
    this.comments[id].push(co);
    await this.saveAll();
  },
  async deleteComment(wid, cid) {
    if (!this.comments[wid]) return;
    this.comments[wid] = this.comments[wid].filter(x=>x.id!==cid);
    await this.saveAll();
  },
  getCarousel() {
    return [
      { url: "https://picsum.photos/id/10/1200/600", alt: "侦探社Logo" },
      { url: "https://picsum.photos/id/11/1200/600", alt: "酒店怪谈" },
      { url: "https://picsum.photos/id/12/1200/600", alt: "惊悸社区" },
      { url: "https://picsum.photos/id/13/1200/600", alt: "书妖诡院" },
      { url: "https://picsum.photos/id/14/1200/600", alt: "基地风暴" },
      { url: "https://picsum.photos/id/15/1200/600", alt: "腐烂豪宅" },
      { url: "https://picsum.photos/id/16/1200/600", alt: "乐园谜夜" },
      { url: "https://picsum.photos/id/17/1200/600", alt: "有诡电车" },
      { url: "https://picsum.photos/id/18/1200/600", alt: "琉璃惊婚" }
    ];
  }
};

// 防火墙防护
(function(){
  const FW = {
    config:{
      badWords:['色','黄','淫','秽','嫖','赌','毒','AV','porn','sex','xxx','约炮','嫖娼','赌博','六合彩','杀猪盘','病毒','黑客','劫持','广告']
    },
    hasBadWord(s){if(!s)return false;s=String(s).toLowerCase();return this.config.badWords.some(w=>s.includes(w));},
    enableSuperProtect(){
      document.addEventListener('contextmenu',e=>e.preventDefault());
      document.addEventListener('keydown',e=>{
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='U')){
          e.preventDefault();
          alert("禁止打开开发者工具");
        }
      });
    },
    start(){this.enableSuperProtect();}
  };
  window.FW=FW;
  FW.start();
})();

// 页面逻辑
const themeBtn=document.getElementById('themeBtn');
const adminLogin=document.getElementById('adminLogin');
const adminPanel=document.getElementById('adminPanel');
const loginBtn=document.getElementById('loginBtn');
const logoutBtn=document.getElementById('logoutBtn');
const uploadBtn=document.getElementById('uploadBtn');
const categoryNav=document.getElementById('categoryNav');
const worksGrid=document.getElementById('worksGrid');
const carousel=document.getElementById('carousel');
const prevCarousel=document.getElementById('prevCarousel');
const nextCarousel=document.getElementById('nextCarousel');
const detailModal=document.getElementById('detailModal');
const detailClose=document.getElementById('detailClose');
const detailMore=document.getElementById('detailMore');
const detailTitle=document.getElementById('detailTitle');
const detailMedia=document.getElementById('detailMedia');
const detailMeta=document.getElementById('detailMeta');
const detailContent=document.getElementById('detailContent');
const detailLikeBtn=document.getElementById('detailLikeBtn');
const detailLikeCount=document.getElementById('detailLikeCount');
const detailViewCount=document.getElementById('detailViewCount');
const commentList=document.getElementById('commentList');
const commentInput=document.getElementById('commentInput');
const commentSend=document.getElementById('commentSend');
const editModal=document.getElementById('editModal');
const cancelEdit=document.getElementById('cancelEdit');
const confirmEdit=document.getElementById('confirmEdit');
const editWorkId=document.getElementById('editWorkId');
const editTitle=document.getElementById('editTitle');
const editContent=document.getElementById('editContent');
const editUrl=document.getElementById('editUrl');
const shareModal=document.getElementById('shareModal');
const shareUrl=document.getElementById('shareUrl');
const copyShareUrl=document.getElementById('copyShareUrl');
const cancelShare=document.getElementById('cancelShare');

let currentCarouselIndex=0;
let currentWorkId=0;
let currentCategory='all';
let isAdmin=false;
const userId = btoa(navigator.userAgent+screen.width+screen.height);

// 暗黑模式
themeBtn.addEventListener('click',()=>{
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'));
});
if(localStorage.getItem('darkMode')==='true') document.body.classList.add('dark-mode');

// 管理员登录（固定账号密码）
loginBtn.addEventListener('click',()=>{
  const a=document.getElementById('adminAccount').value.trim();
  const p=document.getElementById('adminPwd').value.trim();
  if(a==='MINETOWN' && p==='Uis12123password'){
    localStorage.setItem('isAdmin','true');
    isAdmin=true;
    adminLogin.classList.add('hidden');
    adminPanel.classList.add('show');
    alert('登录成功，可上传作品');
  }else{
    alert('账号或密码错误');
  }
});
logoutBtn.addEventListener('click',()=>{
  localStorage.removeItem('isAdmin');
  isAdmin=false;
  adminLogin.classList.remove('hidden');
  adminPanel.classList.remove('show');
  alert('已退出管理员模式');
});
if(localStorage.getItem('isAdmin')==='true'){
  isAdmin=true;
  adminLogin.classList.add('hidden');
  adminPanel.classList.add('show');
}

// 轮播
function renderCarousel(){
  const data=Storage.getCarousel();
  carousel.innerHTML='';
  data.forEach((item,idx)=>{
    const div=document.createElement('div');
    div.className=`carousel-item ${idx===currentCarouselIndex?'active':''}`;
    div.innerHTML=`<img src="${item.url}" alt="${item.alt}">`;
    carousel.appendChild(div);
  });
  carousel.appendChild(prevCarousel);
  carousel.appendChild(nextCarousel);
}
prevCarousel.addEventListener('click',()=>{
  const data=Storage.getCarousel();
  currentCarouselIndex=(currentCarouselIndex-1+data.length)%data.length;
  renderCarousel();
});
nextCarousel.addEventListener('click',()=>{
  const data=Storage.getCarousel();
  currentCarouselIndex=(currentCarouselIndex+1)%data.length;
  renderCarousel();
});

// 分类
document.querySelectorAll('.category-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.category-item').forEach(ci=>ci.classList.remove('active'));
    item.classList.add('active');
    currentCategory=item.dataset.type;
    renderWorks();
  });
});

// 渲染作品
async function renderWorks(){
  let data=Storage.getWorks();
  if(currentCategory!=='all') data=data.filter(x=>x.type===currentCategory);
  worksGrid.innerHTML='';
  data.forEach(item=>{
    const card=document.createElement('div');
    card.className='work-card';
    card.dataset.id=item.id;
    let cover='';
    if(item.type==='image') cover=`<img src="${item.url}" class="work-card-img" alt="${item.title}">`;
    else if(item.type==='video'||item.type==='audio') cover=`<img src="https://picsum.photos/280/180?random=${item.id}" class="work-card-img" alt="${item.title}">`;
    else cover=`<div class="work-card-img" style="background:var(--border-color);display:flex;align-items:center;justify-content:center;color:var(--gray-color);">文字</div>`;
    card.innerHTML=`${cover}<h3 class="work-card-title">${item.title}</h3><div class="work-card-meta"><span>发布：${item.time}</span><span>浏览：${item.views}</span></div>`;
    card.addEventListener('click',()=>openDetail(item.id));
    worksGrid.appendChild(card);
  });
}

// 打开详情
async function openDetail(id){
  currentWorkId=id;
  const work=Storage.getWorks().find(x=>x.id===id);
  if(!work)return;
  await Storage.addViews(id);
  detailTitle.textContent=work.title;
  let media='';
  if(work.type==='image') media=`<img src="${work.url}" alt="${work.title}">`;
  if(work.type==='video') media=`<video controls src="${work.url}"></video>`;
  if(work.type==='audio') media=`<audio controls src="${work.url}">`;
  detailMedia.innerHTML=media;
  detailMeta.innerHTML=`<span>作者：${work.author}</span><span>发布：${work.time}</span><span>标签：${work.tags?.join(', ')||'无'}</span>`;
  detailContent.textContent=work.content||'无内容';
  const isLiked=Storage.likes[`${id}_${userId}`];
  detailLikeCount.textContent=work.likes;
  detailLikeBtn.classList.toggle('active',!!isLiked);
  detailViewCount.textContent=`浏览：${work.views}`;
  detailModal.classList.add('show');
  renderComments();
}
detailClose.addEventListener('click',()=>detailModal.classList.remove('show'));

// 点赞
detailLikeBtn.addEventListener('click',async()=>{
  const isLiked=await Storage.toggleLike(currentWorkId, userId);
  const work=Storage.getWorks().find(x=>x.id===currentWorkId);
  detailLikeCount.textContent=work.likes;
  detailLikeBtn.classList.toggle('active',isLiked);
});

// 评论
function renderComments(){
  const comments=Storage.getComments(currentWorkId);
  commentList.innerHTML='';
  comments.forEach(co=>{
    const div=document.createElement('div');
    div.className=`comment-item ${co.isSelf?'comment-self':''}`;
    div.dataset.id=co.id;
    div.innerHTML=`<div class="comment-author">${co.isSelf?'自己':'网友'}</div><div class="comment-time">${co.time}</div><div class="comment-content">${co.content}</div>`;
    if(isAdmin){
      div.addEventListener('contextmenu',e=>{
        e.preventDefault();
        if(confirm('删除这条评论？')){
          Storage.deleteComment(currentWorkId,co.id).then(()=>renderComments());
        }
      });
    }
    commentList.appendChild(div);
  });
}
commentSend.addEventListener('click',async()=>{
  const content=commentInput.value.trim();
  if(!content)return alert('请输入评论内容');
  if(FW.hasBadWord(content)){alert('包含违规内容，禁止发布');commentInput.value='';return;}
  await Storage.addComment(currentWorkId,{content,isSelf:true});
  commentInput.value='';
  renderComments();
});

// 更多操作
detailMore.addEventListener('click',()=>{
  if(!isAdmin)return;
  const act=prompt('操作：1编辑 2删除 3分享');
  if(act==='1')openEditModal();
  else if(act==='2'){
    if(confirm('确定删除该作品？')){
      Storage.deleteWork(currentWorkId).then(()=>{
        detailModal.classList.remove('show');
        renderWorks();
      });
    }
  }
  else if(act==='3')openShareModal();
});

// 编辑
function openEditModal(){
  const work=Storage.getWorks().find(x=>x.id===currentWorkId);
  editWorkId.value=work.id;
  editTitle.value=work.title;
  editContent.value=work.content;
  editUrl.value=work.url;
  editModal.classList.add('show');
}
cancelEdit.addEventListener('click',()=>editModal.classList.remove('show'));
confirmEdit.addEventListener('click',async()=>{
  const w={id:+editWorkId.value,title:editTitle.value.trim(),content:editContent.value.trim(),url:editUrl.value.trim()};
  if(!w.title)return alert('请输入作品标题');
  await Storage.editWork(w);
  editModal.classList.remove('show');
  openDetail(currentWorkId);
  renderWorks();
  alert('编辑成功');
});

// 分享
function openShareModal(){
  shareUrl.value=Storage.shareWork(currentWorkId);
  shareModal.classList.add('show');
}
copyShareUrl.addEventListener('click',()=>{
  shareUrl.select();document.execCommand('copy');alert('链接已复制');
});
cancelShare.addEventListener('click',()=>shareModal.classList.remove('show'));

// 上传作品
uploadBtn.addEventListener('click',async()=>{
  const title=document.getElementById('workTitle').value.trim();
  const type=document.getElementById('workType').value;
  const author=document.getElementById('workAuthor').value.trim()||'匿名';
  const url=document.getElementById('workUrl').value.trim();
  const content=document.getElementById('workContent').value.trim();
  const tags=document.getElementById('workTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if(!title)return alert('请输入作品标题');
  await Storage.addWork({title,type,author,url,content,tags});
  alert('上传成功，所有人可见');
  renderWorks();
  document.getElementById('workTitle').value='';
  document.getElementById('workUrl').value='';
  document.getElementById('workContent').value='';
  document.getElementById('workTags').value='';
});

// 初始化
(async()=>{
  await Storage.init();
  renderCarousel();
  renderWorks();
})();
</script>
</body>
</html>
