<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智库</title>
<style>
:root {
  --bg-color: #fff;
  --text-color: #333;
  --card-color: #f9f9f9;
  --border-color: #eee;
  --primary-color: #425aef;
  --gray-color: #666;
  --red-color: #ff4d4f;
  --active-color: #425aef;
  --warn-color: #f56c6c;
  --success-color: #67c23a;
}
.dark-mode {
  --bg-color: #1a1a1a;
  --text-color: #e5e5e5;
  --card-color: #2a2a2a;
  --border-color: #333;
  --primary-color: #5b77ff;
  --gray-color: #999;
  --active-color: #5b77ff;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  background: var(--bg-color);
  color: var(--text-color);
  transition: all 0.3s;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  line-height: 1.6;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--primary-color);
}
.theme-btn, .admin-btn, .edit-btn, .del-btn {
  padding: 8px 16px;
  border: none;
  border-radius: 20px;
  background: var(--primary-color);
  color: #fff;
  cursor: pointer;
  margin: 2px;
}
.del-btn {background: var(--warn-color);}
.admin-login, .admin-panel, .carousel-set {
  background: var(--card-color);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 20px;
}
.admin-login {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.admin-login input {
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
}
.admin-panel, .carousel-set {display: none;}
.admin-panel.show, .carousel-set.show {display: block;}
.upload-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
.upload-area input, .upload-area select, .upload-area textarea {
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
}
.upload-btn {
  background: var(--primary-color);
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}
.carousel {
  position: relative;
  width: 100%;
  height: 300px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 30px;
  border: 1px solid var(--border-color);
}
.carousel-item {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s;
}
.carousel-item.active {opacity: 1;}
.carousel-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  z-index: 10;
}
.prev-btn { left: 10px; }
.next-btn { right: 10px; }
.category-nav {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 10px;
}
.category-item {
  padding: 8px 16px;
  cursor: pointer;
  position: relative;
  color: var(--text-color);
  transition: color 0.3s;
}
.category-item.active {color: var(--active-color);}
.category-item.active::after {
  content: "";
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-bottom: 6px solid var(--active-color);
}
.works-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}
.work-card {
  background: var(--card-color);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: transform 0.2s;
  position: relative;
}
.work-card:hover {transform: translateY(-5px);}
.work-card-img {
  width: 100%;
  height: 180px;
  border-radius: 8px;
  object-fit: cover;
  margin-bottom: 10px;
}
.work-card-title {
  font-size: 18px;
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.work-card-meta {
  font-size: 12px;
  color: var(--gray-color);
  display: flex;
  justify-content: space-between;
}
.empty-tip {
  text-align: center;
  padding: 40px;
  color: var(--gray-color);
  font-size: 16px;
}
.detail-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  display: none;
  padding: 20px;
  overflow-y: auto;
}
.detail-box {
  max-width: 900px;
  margin: 0 auto;
  background: var(--bg-color);
  border-radius: 12px;
  overflow: hidden;
}
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid var(--border-color);
}
.detail-close {
  font-size: 24px;
  cursor: pointer;
}
.detail-more {
  font-size: 20px;
  cursor: pointer;
}
.detail-media {
  width: 100%;
  max-height: 500px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-media img, .detail-media video, .detail-media audio {
  max-width: 100%;
  max-height: 500px;
}
.detail-info {padding: 20px;}
.detail-title {font-size: 24px; margin-bottom: 10px;}
.detail-meta {
  display: flex;
  gap: 20px;
  color: var(--gray-color);
  margin-bottom: 15px;
  flex-wrap: wrap;
}
.detail-interact {
  display: flex;
  gap: 20px;
  margin: 15px 0;
  align-items: center;
}
.like-btn {
  background: none;
  border: none;
  color: var(--gray-color);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 16px;
}
.like-btn.active {color: var(--red-color);}
.comment-area {
  border-top: 1px solid var(--border-color);
  padding: 20px;
}
.comment-list {margin-bottom: 20px;}
.comment-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}
.comment-author {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 5px;
}
.comment-content {margin-bottom: 5px;}
.comment-time {
  font-size: 12px;
  color: var(--gray-color);
}
.comment-del {
  position: absolute;
  right: 0;
  top: 10px;
  color: var(--warn-color);
  cursor: pointer;
  font-size: 12px;
  display: none;
}
.comment-item.admin-show .comment-del {display: inline;}
.comment-input-box {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.comment-input {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-color);
  color: var(--text-color);
  min-width: 120px;
}
.comment-send {
  padding: 0 20px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.func-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-color);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 20px;
  z-index: 1000;
  display: none;
  width: 90%;
  max-width: 400px;
}
.func-modal.show {display: block;}
.func-modal input, .func-modal textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--bg-color);
  color: var(--text-color);
}
.func-btn-group {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.func-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.confirm-btn {background: var(--primary-color); color: #fff;}
.cancel-btn {background: var(--gray-color); color: #fff;}
.loading-tip {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 9999;
  display: none;
}
.hidden {display: none !important;}

@media (max-width: 768px) {
  body { padding: 16px; }
  .carousel { height: 180px; }
  .admin-login { justify-content: center; }
  .detail-interact { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="loading-tip" id="loadingTip">加载中...</div>

<div class="header">
  <div class="logo">智库 完全体</div>
  <div>
    <button class="theme-btn" id="themeBtn">暗黑模式</button>
    <button class="admin-btn" id="openCarouselSet">轮播管理</button>
  </div>
</div>

<div class="admin-login" id="adminLogin">
  <input type="text" id="adminAccount" placeholder="管理员账号">
  <input type="password" id="adminPwd" placeholder="管理员密码">
  <button class="admin-btn" id="loginBtn">登录管理</button>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>作品上传 / 管理</h3>
  <div class="upload-area">
    <input type="text" id="workTitle" placeholder="作品标题">
    <select id="workType">
      <option value="text">文字</option>
      <option value="image">图片</option>
      <option value="video">视频</option>
      <option value="audio">音频</option>
    </select>
    <input type="text" id="workAuthor" placeholder="作者昵称" value="匿名">
    <input type="text" id="workUrl" placeholder="媒体外链">
    <textarea id="workContent" rows="3" placeholder="作品内容"></textarea>
    <input type="text" id="workTags" placeholder="标签 逗号分隔">
    <button class="upload-btn" id="uploadBtn">发布作品</button>
  </div>
  <br>
  <button class="admin-btn" id="logoutBtn">退出登录</button>
</div>

<div class="carousel-set" id="carouselSet">
  <h3>轮播图管理（每行一张链接）</h3>
  <textarea id="carouselUrlList" rows="5" style="width:100%"></textarea>
  <button class="upload-btn" id="saveCarouselBtn" style="margin-top:10px;">保存轮播</button>
</div>

<div class="carousel" id="carousel">
  <button class="carousel-btn prev-btn" id="prevCarousel">&lt;&lt;</button>
  <button class="carousel-btn next-btn" id="nextCarousel">&gt;&gt;</button>
</div>

<div class="category-nav" id="categoryNav">
  <div class="category-item active" data-type="all">全部</div>
  <div class="category-item" data-type="text">文章</div>
  <div class="category-item" data-type="image">图片</div>
  <div class="category-item" data-type="video">视频</div>
  <div class="category-item" data-type="audio">音频</div>
</div>

<div class="works-grid" id="worksGrid"></div>

<div class="detail-modal" id="detailModal">
  <div class="detail-box">
    <div class="detail-header">
      <h2 class="detail-title" id="detailTitle"></h2>
      <div class="detail-close" id="detailClose">×</div>
    </div>
    <div class="detail-media" id="detailMedia"></div>
    <div class="detail-info">
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="detail-interact">
        <button class="like-btn" id="detailLikeBtn"> ❤ <span id="detailLikeCount">0</span> </button>
        <span id="detailViewCount">浏览：0</span>
        <button class="edit-btn hidden" id="editCurrWork">编辑作品</button>
        <button class="del-btn hidden" id="delCurrWork">删除作品</button>
      </div>
    </div>
    <div class="comment-area">
      <h3>评论区</h3>
      <div class="comment-list" id="commentList"></div>
      <div class="comment-input-box">
        <input type="text" class="comment-input" id="nickInput" placeholder="你的昵称" value="访客">
        <input type="text" class="comment-input" id="commentInput" placeholder="写下评论...">
        <button class="comment-send" id="commentSend">发送</button>
      </div>
    </div>
  </div>
</div>

<div class="func-modal" id="editWorkModal">
  <h3>编辑作品</h3>
  <input type="hidden" id="editWorkId">
  <input type="text" id="editTitle" placeholder="标题">
  <textarea rows="3" id="editContent" placeholder="内容"></textarea>
  <input type="text" id="editUrl" placeholder="媒体链接">
  <div class="func-btn-group">
    <button class="func-btn cancel-btn" id="cancelEditWork">取消</button>
    <button class="func-btn confirm-btn" id="confirmEditWork">保存</button>
  </div>
</div>

<script>
// 云端数据库
const API = "https://jsonblob.com/api/jsonBlob/1192001252562219008";
// 登录有效期 2小时
const ADMIN_EXPIRE = 2 * 60 * 60 * 1000;

// 本地初始兜底数据（保证秒加载、秒点击）
let appData = {
  carousel:[
    {url:"https://picsum.photos/1200/300?1",alt:"轮播1"},
    {url:"https://picsum.photos/1200/300?2",alt:"轮播2"},
    {url:"https://picsum.photos/1200/300?3",alt:"轮播3"}
  ],
  works:[
    {id:1,title:"示例作品",type:"image",url:"https://picsum.photos/600/400",author:"系统",content:"稳定完全体版本",tags:["默认"],time:"2025-05-05",views:10,likes:2}
  ],
  comments:{},
  likeRecord:{}
};

// 页面元素
const loadingTip = document.getElementById('loadingTip');
const themeBtn = document.getElementById('themeBtn');
const adminLogin = document.getElementById('adminLogin');
const adminPanel = document.getElementById('adminPanel');
const carouselSet = document.getElementById('carouselSet');
const openCarouselSet = document.getElementById('openCarouselSet');
const saveCarouselBtn = document.getElementById('saveCarouselBtn');
const carouselUrlList = document.getElementById('carouselUrlList');
const loginBtn = document.getElementById('loginBtn');
logoutBtn = document.getElementById('logoutBtn');
uploadBtn = document.getElementById('uploadBtn');
categoryNav = document.getElementById('categoryNav');
worksGrid = document.getElementById('worksGrid');
carousel = document.getElementById('carousel');
prevCarousel = document.getElementById('prevCarousel');
nextCarousel = document.getElementById('nextCarousel');
detailModal = document.getElementById('detailModal');
detailClose = document.getElementById('detailClose');
detailTitle = document.getElementById('detailTitle');
detailMedia = document.getElementById('detailMedia');
detailMeta = document.getElementById('detailMeta');
detailContent = document.getElementById('detailContent');
detailLikeBtn = document.getElementById('detailLikeBtn');
detailLikeCount = document.getElementById('detailLikeCount');
detailViewCount = document.getElementById('detailViewCount');
editCurrWork = document.getElementById('editCurrWork');
delCurrWork = document.getElementById('delCurrWork');
commentList = document.getElementById('commentList');
nickInput = document.getElementById('nickInput');
commentInput = document.getElementById('commentInput');
commentSend = document.getElementById('commentSend');
editWorkModal = document.getElementById('editWorkModal');
cancelEditWork = document.getElementById('cancelEditWork');
confirmEditWork = document.getElementById('confirmEditWork');

let currentCarouselIndex = 0;
let currentWorkId = 0;
let currentCategory = 'all';
let isAdmin = false;
const uid = btoa(navigator.userAgent+screen.width);

// 格式化时间
function formatTime(str){
  let t = new Date(str);
  let now = new Date();
  let diff = Math.floor((now - t)/1000);
  if(diff < 60) return "刚刚";
  if(diff < 3600) return Math.floor(diff/60)+"分钟前";
  if(diff < 86400) return Math.floor(diff/3600)+"小时前";
  let d1 = now.toDateString();
  let d2 = t.toDateString();
  if(d1 === d2) return "今天 "+t.getHours()+":"+String(t.getMinutes()).padStart(2,'0');
  return t.getMonth()+1+"月"+t.getDate()+"日";
}

// 显示加载提示
function showTip(txt){
  loadingTip.innerText = txt;
  loadingTip.style.display = 'block';
  setTimeout(()=>loadingTip.style.display='none',1500);
}

// 先立即渲染本地数据，保证老版稳定秒点开
renderAll();

// 静默同步云端 + 定时自动同步
function syncCloud(){
  fetch(API)
  .then(res=>{
    if(!res.ok) throw Error();
    return res.json();
  })
  .then(d=>{
    if(d) {
      appData = d;
      localStorage.setItem('siteBackup',JSON.stringify(appData));
      renderAll();
    }
  })
  .catch(()=>{
    let backup = localStorage.getItem('siteBackup');
    if(backup) appData = JSON.parse(backup);
    renderAll();
    showTip('网络异常，已加载本地缓存');
  });
}
syncCloud();
setInterval(syncCloud,10000);

// 保存到云端+本地备份
function saveCloud(){
  fetch(API,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(appData)
  });
  localStorage.setItem('siteBackup',JSON.stringify(appData));
}

// 暗黑模式
themeBtn.onclick = ()=>document.body.classList.toggle('dark-mode');

// 轮播管理
openCarouselSet.onclick = ()=>{
  if(!isAdmin) return showTip('请先登录管理员');
  carouselSet.classList.toggle('show');
  carouselUrlList.value = appData.carousel.map(x=>x.url).join('\n');
};
saveCarouselBtn.onclick = ()=>{
  let arr = carouselUrlList.value.split('\n').map(x=>x.trim()).filter(x=>x);
  appData.carousel = arr.map(url=>({url,alt:"轮播图"}));
  saveCloud();
  renderCarousel();
  showTip('轮播保存成功');
};

// 管理员登录带时效
loginBtn.onclick = ()=>{
  let a = document.getElementById('adminAccount').value.trim();
  let p = document.getElementById('adminPwd').value.trim();
  if(a==='MINETOWN'&&p==='Uis12123password'){
    localStorage.setItem('adminLoginTime',Date.now());
    localStorage.isAdmin=1;
    isAdmin=true;
    adminLogin.classList.add('hidden');
    adminPanel.classList.add('show');
    showTip('登录成功');
  }else{
    showTip('账号密码错误');
  }
};
logoutBtn.onclick = ()=>{
  localStorage.removeItem('isAdmin');
  localStorage.removeItem('adminLoginTime');
  isAdmin=false;
  adminLogin.classList.remove('hidden');
  adminPanel.classList.remove('show');
  carouselSet.classList.remove('show');
  showTip('已退出登录');
};
// 登录时效校验
if(localStorage.isAdmin && localStorage.adminLoginTime){
  let loginTime = parseInt(localStorage.adminLoginTime);
  if(Date.now() - loginTime < ADMIN_EXPIRE){
    isAdmin=true;
    adminLogin.classList.add('hidden');
    adminPanel.classList.add('show');
  }else{
    localStorage.removeItem('isAdmin');
    localStorage.removeItem('adminLoginTime');
  }
}

// 轮播渲染
function renderCarousel(){
  carousel.innerHTML='';
  appData.carousel.forEach((item,i)=>{
    let div = document.createElement('div');
    div.className = `carousel-item ${i===currentCarouselIndex?'active':''}`;
    div.innerHTML = `<img src="${item.url}" alt="${item.alt}">`;
    carousel.appendChild(div);
  });
  carousel.appendChild(prevCarousel);
  carousel.appendChild(nextCarousel);
}
prevCarousel.onclick = ()=>{
  currentCarouselIndex = (currentCarouselIndex-1+appData.carousel.length)%appData.carousel.length;
  renderCarousel();
};
nextCarousel.onclick = ()=>{
  currentCarouselIndex = (currentCarouselIndex+1)%appData.carousel.length;
  renderCarousel();
};

// 分类切换
document.querySelectorAll('.category-item').forEach(item=>{
  item.onclick = function(){
    document.querySelectorAll('.category-item').forEach(c=>c.classList.remove('active'));
    this.classList.add('active');
    currentCategory = this.dataset.type;
    renderWorks();
  };
});

// 渲染作品（保留老版直绑点击，绝不失效）
function renderWorks(){
  let list = appData.works;
  if(currentCategory!=='all') list = list.filter(x=>x.type===currentCategory);
  worksGrid.innerHTML='';
  if(list.length===0){
    worksGrid.innerHTML = '<div class="empty-tip">暂无作品</div>';
    return;
  }
  list.forEach(item=>{
    let card = document.createElement('div');
    card.className='work-card';
    let cover='';
    if(item.type==='image') cover=`<img src="${item.url}" class="work-card-img">`;
    else if(item.type==='video'||item.type==='audio') cover=`<img src="https://picsum.photos/280/180?r=${item.id}" class="work-card-img">`;
    else cover=`<div class="work-card-img" style="background:var(--border-color);display:flex;align-items:center;justify-content:center">文字</div>`;
    card.innerHTML = `
      ${cover}
      <h3 class="work-card-title">${item.title}</h3>
      <div class="work-card-meta">
        <span>${item.time}</span>
        <span>浏览${item.views} ❤${item.likes}</span>
      </div>
    `;
    card.onclick = function(){openDetail(item.id);};
    worksGrid.appendChild(card);
  });
}

// 打开详情+真实浏览量
function openDetail(id){
  currentWorkId = id;
  let work = appData.works.find(x=>x.id===id);
  if(!work)return;
  // 浏览量+1
  work.views += 1;
  saveCloud();

  detailTitle.textContent = work.title;
  let media='';
  if(work.type==='image') media=`<img src="${work.url}">`;
  if(work.type==='video') media=`<video controls src="${work.url}"></video>`;
  if(work.type==='audio') media=`<audio controls src="${work.url}">`;
  detailMedia.innerHTML = media;
  detailMeta.innerHTML = `作者：${work.author}｜标签：${work.tags?.join(',')||'无'}`;
  detailContent.textContent = work.content||'';
  detailLikeCount.textContent = work.likes;
  detailViewCount.textContent = `浏览：${work.views}`;

  // 管理员显示编辑删除按钮
  if(isAdmin){
    editCurrWork.classList.remove('hidden');
    delCurrWork.classList.remove('hidden');
  }else{
    editCurrWork.classList.add('hidden');
    delCurrWork.classList.add('hidden');
  }

  // 点赞状态
  let hasLike = appData.likeRecord[uid+"_"+id];
  if(hasLike) detailLikeBtn.classList.add('active');
  else detailLikeBtn.classList.remove('active');

  detailModal.style.display = 'block';
  renderComments();
}

// 关闭详情
detailClose.onclick = ()=>detailModal.style.display='none';

// 点赞 一人一次可取消
detailLikeBtn.onclick = function(){
  let key = uid+"_"+currentWorkId;
  let work = appData.works.find(x=>x.id===currentWorkId);
  if(appData.likeRecord[key]){
    // 取消点赞
    work.likes -= 1;
    delete appData.likeRecord[key];
    detailLikeBtn.classList.remove('active');
  }else{
    // 新增点赞
    work.likes += 1;
    appData.likeRecord[key] = 1;
    detailLikeBtn.classList.add('active');
  }
  detailLikeCount.textContent = work.likes;
  saveCloud();
};

// 渲染评论 + 管理员删评论
function renderComments(){
  let list = appData.comments[currentWorkId]||[];
  commentList.innerHTML='';
  list.forEach((c,idx)=>{
    let item = document.createElement('div');
    item.className = 'comment-item '+(isAdmin?'admin-show':'');
    item.innerHTML = `
      <div class="comment-author">${c.name}</div>
      <div class="comment-content">${c.txt}</div>
      <div class="comment-time">${formatTime(c.t)}</div>
      <span class="comment-del" data-idx="${idx}">删除</span>
    `;
    commentList.appendChild(item);
  });
  // 删评论事件
  document.querySelectorAll('.comment-del').forEach(el=>{
    el.onclick = function(e){
      e.stopPropagation();
      let idx = parseInt(this.dataset.idx);
      appData.comments[currentWorkId].splice(idx,1);
      saveCloud();
      renderComments();
      showTip('已删除评论');
    };
  });
}

// 发评论 自定义昵称
commentSend.onclick = function(){
  let name = nickInput.value.trim()||'访客';
  let txt = commentInput.value.trim();
  if(!txt) return showTip('请输入评论内容');
  if(!appData.comments[currentWorkId]) appData.comments[currentWorkId]=[];
  appData.comments[currentWorkId].push({
    name,txt,t:new Date().toISOString()
  });
  commentInput.value='';
  saveCloud();
  renderComments();
  showTip('评论成功');
};

// 管理员删除作品
delCurrWork.onclick = function(){
  if(!confirm('确定删除该作品？不可恢复！'))return;
  appData.works = appData.works.filter(x=>x.id!==currentWorkId);
  if(appData.comments[currentWorkId]) delete appData.comments[currentWorkId];
  saveCloud();
  detailModal.style.display='none';
  renderAll();
  showTip('作品已删除');
};

// 管理员编辑作品
editCurrWork.onclick = function(){
  let work = appData.works.find(x=>x.id===currentWorkId);
  document.getElementById('editWorkId').value = work.id;
  document.getElementById('editTitle').value = work.title;
  document.getElementById('editContent').value = work.content||'';
  document.getElementById('editUrl').value = work.url||'';
  editWorkModal.classList.add('show');
};
cancelEditWork.onclick = ()=>editWorkModal.classList.remove('show');
confirmEditWork.onclick = function(){
  let id = parseInt(document.getElementById('editWorkId').value);
  let title = document.getElementById('editTitle').value.trim();
  let content = document.getElementById('editContent').value.trim();
  let url = document.getElementById('editUrl').value.trim();
  if(!title) return showTip('标题不能为空');
  let work = appData.works.find(x=>x.id===id);
  work.title = title;
  work.content = content;
  work.url = url;
  saveCloud();
  editWorkModal.classList.remove('show');
  openDetail(id);
  renderAll();
  showTip('编辑保存成功');
};

// 上传作品
uploadBtn.onclick = function(){
  if(!isAdmin) return showTip('请先登录管理员');
  let title = document.getElementById('workTitle').value.trim();
  let type = document.getElementById('workType').value;
  let author = document.getElementById('workAuthor').value.trim()||'匿名';
  let url = document.getElementById('workUrl').value.trim();
  let content = document.getElementById('workContent').value.trim();
  let tags = document.getElementById('workTags').value.split(',').map(x=>x.trim()).filter(x=>x);
  if(!title)return showTip('请填写作品标题');
  let newId = appData.works.length?Math.max(...appData.works.map(x=>x.id))+1:1;
  appData.works.unshift({
    id:newId,title,type,author,url,content,tags,
    time:new Date().toLocaleDateString(),
    views:0,likes:0
  });
  saveCloud();
  showTip('发布成功，全网可见');
  renderAll();
};

// 统一渲染
function renderAll(){
  renderCarousel();
  renderWorks();
}
</script>
</body>
</html>
